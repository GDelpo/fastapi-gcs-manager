{# Auth JS — token management & API fetch for Storage.
   Authenticates via the identity service (cross-service).
   Uses st_token / st_user localStorage keys. #}
<script>
  const API_BASE = BASE + '/api/v1';

  function getToken() { return localStorage.getItem('st_token'); }
  function setToken(t) { localStorage.setItem('st_token', t); }
  function clearToken() { localStorage.removeItem('st_token'); localStorage.removeItem('st_user'); }

  function getUser() {
    try { return JSON.parse(localStorage.getItem('st_user')); } catch { return null; }
  }

  async function apiFetch(path, opts = {}) {
    const token = getToken();
    if (!token) { goLogin(); return null; }
    const maxRetries = opts._retries ?? 3;
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
      try {
        const { _retries: _r, ...fetchOpts } = opts;
        const resp = await fetch(API_BASE + path, {
          ...fetchOpts,
          headers: {
            'Authorization': 'Bearer ' + token,
            'Accept': 'application/json',
            ...(opts.headers || {}),
          },
        });
        if (resp.status === 401 || resp.status === 403) { goLogin(); return null; }
        // Retry on 502/503 (Traefik "no available server")
        if ((resp.status === 502 || resp.status === 503) && attempt < maxRetries) {
          await new Promise(r => setTimeout(r, Math.min(1000 * Math.pow(2, attempt - 1), 8000)));
          continue;
        }
        return resp;
      } catch (err) {
        // Network error — retry
        if (attempt < maxRetries) {
          await new Promise(r => setTimeout(r, Math.min(1000 * Math.pow(2, attempt - 1), 8000)));
          continue;
        }
        console.error('apiFetch failed after retries:', err);
        return null;
      }
    }
    return null;
  }

  /** apiFetch but for multipart/form-data — do NOT set Content-Type (browser sets boundary) */
  async function apiUpload(path, formData, { onProgress } = {}) {
    const token = getToken();
    if (!token) { goLogin(); return null; }

    // Use XMLHttpRequest if progress callback provided
    if (onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', API_BASE + path);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
        });
        xhr.onload = () => {
          if (xhr.status === 401 || xhr.status === 403) { goLogin(); return resolve(null); }
          resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, json: () => Promise.resolve(JSON.parse(xhr.responseText)) });
        };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send(formData);
      });
    }

    const resp = await fetch(API_BASE + path, {
      method: 'POST',
      body: formData,
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (resp.status === 401 || resp.status === 403) { goLogin(); return null; }
    return resp;
  }

  /** Download a file with auth — fetches as blob and triggers browser download */
  async function apiDownload(path, filename) {
    const token = getToken();
    if (!token) { goLogin(); return; }
    try {
      const resp = await fetch(API_BASE + path, {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (resp.status === 401 || resp.status === 403) { goLogin(); return; }
      if (!resp.ok) { showToast('Download error', 'error'); return; }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename || 'download'; a.style.display = 'none';
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
    } catch (e) {
      showToast('Download error: ' + e.message, 'error');
    }
  }

  function goLogin() {
    clearToken();
    window.location.href = BASE + '/dashboard/login';
  }

  function logout() { goLogin(); }

  // Shell init — user info in sidebar
  (function initShell() {
    if (!getToken()) { goLogin(); return; }
    const user = getUser();
    if (user) {
      const nameEl = document.getElementById('user-name');
      const roleEl = document.getElementById('user-role');
      const initEl = document.getElementById('user-initials');
      if (nameEl) nameEl.textContent = user.userName || 'Admin';
      if (roleEl) roleEl.textContent = user.role || 'admin';
      if (initEl) initEl.textContent = (user.userName || 'A')[0].toUpperCase();
    }
  })();
</script>
