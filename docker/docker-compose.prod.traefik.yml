# ============================================================================
# Storage Service - Docker Compose (Production with Traefik)
# ============================================================================
#
# PREREQUISITES:
#   1. Traefik running: docker compose -f docker-compose.traefik.yml up -d
#   2. Network created: docker network create traefik-public
#   3. .env file configured in parent directory
#   4. credentials/google_credentials.json present
#
# USAGE:
#   cd storage
#   docker compose --env-file .env -f docker/docker-compose.prod.traefik.yml up -d --build
#   docker compose --env-file .env -f docker/docker-compose.prod.traefik.yml logs -f
#
# ACCESS:
#   Via Traefik: http://<server>/storage/api/v1/...
#   Health:      http://<server>/storage/health
#   Docs:        http://<server>/storage/docs
#   Dashboard:   http://<server>/storage/dashboard/
# ============================================================================

name: storage

services:
  # ---------------------------------------------------------------------------
  # Storage API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    image: storage-api:${PROJECT_VERSION:-latest}
    container_name: storage_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DEBUG: "false"
      IDENTITY_SERVICE_URL: http://identidad_api:8080/api/v1
      IDENTITY_EXTERNAL_URL: http://192.168.190.95/identidad/api/v1
    volumes:
      - ../credentials:/app/credentials:ro
    networks:
      - traefik-public
    labels:
      # Enable Traefik
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"

      # Router: Match requests to /storage/*
      - "traefik.http.routers.storage.rule=PathPrefix(`/storage`)"
      - "traefik.http.routers.storage.entrypoints=web"
      - "traefik.http.routers.storage.service=storage"

      # Middlewares: add prefix header + strip prefix
      - "traefik.http.routers.storage.middlewares=storage-prefix,storage-strip"
      - "traefik.http.middlewares.storage-prefix.headers.customrequestheaders.X-Forwarded-Prefix=/storage"
      - "traefik.http.middlewares.storage-strip.stripprefix.prefixes=/storage"

      # Service: Load balancer configuration
      - "traefik.http.services.storage.loadbalancer.server.port=8000"
      - "traefik.http.services.storage.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.storage.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.services.storage.loadbalancer.healthcheck.timeout=15s"
    command: gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --log-level info --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik-public:
    external: true
